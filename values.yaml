microservice:
  replicaCount: 1

  image:
    repository: ghcr.io/victordomoto/app-hello-php:1.0.0   # TODO: replace with your GHCR image
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 80
    targetPort: 80

  ingress:
    enabled: true
    host: hello-php.homelab.local    # TODO: replace with your homelab DNS/hostname
    # className: nginx               # uncomment if using nginx ingress controller

  env:
    APP_ENV: dev

  resources: {}
