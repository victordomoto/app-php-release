microservice:
  replicaCount: 1

  image:
    repository: ghcr.io/victordomoto/app-hello-php  
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 80
    targetPort: 80

  ingress:
    enabled: true
    className: nginx
    host: hello-php.homelab.local    # TODO: replace with your homelab DNS/hostname
    # className: nginx               # uncomment if using nginx ingress controller

  env:
    APP_ENV: dev

  resources: {}
